name: Bazel Build (依存ビルド・インクリメンタル実証)

# epic #243 ② — factory に Bazel 依存ビルドを導入し、共有 template / store.json の
# 変更を Bazel の依存グラフで追跡して「変わったものだけ」を効率リビルドする。
#
#   - store.json 変更 → その 1 サイトのみリビルド（他はキャッシュ再利用）
#   - 共有 template（site-builder/）変更 → その template を入力に持つ全依存サイトがリビルド
#
# 本ワークフローは段階移行のため既存の Node ビルダー（auto-build / template-build /
# build-site）と並存する。当面は per-site Bazel ビルドの動作と差分ビルドの実証が目的。
#
# トリガー:
#   - workflow_dispatch: targets= を指定して任意ターゲットを Bazel ビルド
#   - pull_request: Bazel 設定 / ルール / site-builder 変更時に少数サイトのビルドを検証

on:
  workflow_dispatch:
    inputs:
      targets:
        description: "Bazel ターゲット（空なら検証用の少数サイト）"
        required: false
        default: ""
  pull_request:
    paths:
      - "MODULE.bazel"
      - ".bazelrc"
      - ".bazelversion"
      - "bazel/**"
      - "site-builder/**"
      - "scripts/gen_store_builds.py"

permissions:
  contents: read

concurrency:
  group: bazel-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bazel-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bazelisk
        uses: bazel-contrib/setup-bazel@0.15.0
        with:
          # Bazel リポジトリキャッシュを GitHub Actions cache で共有（高速化）
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true

      - name: Pre-install site-builder node_modules
        # astro_data_site ルールへ事前 install 済み node_modules を渡して高速化
        # （未設定でもラッパーが npm ci するが CI では事前 install が安定・高速）
        run: |
          npm --prefix site-builder ci --no-audit --no-fund
          echo "FACTORY_NODE_MODULES=$(pwd)/site-builder/node_modules" >> "$GITHUB_ENV"

      - name: Verify generated BUILD.bazel are up to date
        run: python3 scripts/gen_store_builds.py --check

      - name: Bazel build (targets)
        run: |
          set -euo pipefail
          TARGETS="${{ github.event.inputs.targets }}"
          if [ -z "${TARGETS}" ]; then
            # PR / 既定: 検証用に少数の代表サイトをビルド（フル 1397 は重いため後続）
            # NOTE: '//stores/...:site' は不正な target pattern（'...' は :name と併用不可で
            #   bazel が exit 7 を返す）。:site rule を名前で絞り込むには attr(name,...) を使う。
            #   また結果を head にパイプすると set -o pipefail 下で SIGPIPE(141) で abort するため
            #   全ストリームを読む awk 'NR<=3' を使う。
            TARGETS="$(bazelisk query 'attr(name, "^site$", //stores/...)' 2>/dev/null | awk 'NR<=3' | tr '\n' ' ')"
            TARGETS="${TARGETS} //data/cities:all"
          fi
          echo "Building: ${TARGETS}"
          bazelisk build --config=ci ${TARGETS}

      - name: Incremental rebuild demo (store.json 変更 = 1 サイトのみ)
        if: github.event.inputs.targets == ''
        run: |
          set -euo pipefail
          # 直前ビルドの代表 3 サイトを取得（query パターン・SIGPIPE 回避は上記ステップと同様）
          SITES="$(bazelisk query 'attr(name, "^site$", //stores/...)' 2>/dev/null | awk 'NR<=3' | tr '\n' ' ')"
          FIRST="$(echo ${SITES} | awk '{print $1}')"
          # FIRST の store.json を 1 件だけ変更 → 再ビルドは 1 action のみのはず
          PKG="$(echo ${FIRST} | sed 's#//##; s#:site##')"
          python3 - "$PKG" <<'PY'
          import json, sys, os
          pkg = sys.argv[1]
          p = os.path.join(pkg, "store.json")
          d = json.load(open(p, encoding="utf-8"))
          d["description"] = "ci-incremental-demo " + (d.get("description") or "")
          json.dump(d, open(p, "w", encoding="utf-8"), ensure_ascii=False, indent=2)
          print("modified", p)
          PY
          echo "::group::rebuild after 1 store.json change (expect: 1 local action)"
          bazelisk build --config=ci ${SITES} 2>&1 | tee /tmp/inc.log
          echo "::endgroup::"
          git checkout -- "${PKG}/store.json"
          grep -E "processes" /tmp/inc.log || true
