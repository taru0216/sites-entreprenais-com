name: Crawl Retty Stores

# Retty 公開サイトをクロールして store.json / sitemap.json / search-index.json を
# 生成・コミットする（foodre #229 / #230）。
# 公開ページのみを対象とし、内部 API には一切アクセスしない。
#
# 2 ステップ構成（#32）:
#   Step① discovery（gen-csv）: area_url → 飲食店 URL の CSV を生成し、中間成果物
#     として data/crawl-targets/{area}.csv にコミットする（人手キュレーション可能）。
#   Step② extraction（--csv）: 生成した CSV を渡して store.json を生成する。
# csv 入力を直接指定した場合は Step① をスキップして既存 CSV を使う。

on:
  # 夜間バッチ（03:00 JST = 18:00 UTC）。レートリミット（HTTP 429）回避のため
  # sleep=5 で恵比寿全店を時間をかけて取得する。schedule トリガーは inputs を
  # 持たないため、各ステップで github.event.inputs の || フォールバックを使う。
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      area_url:
        description: "Step① 対象 Retty エリア一覧 URL（既定: 恵比寿 https://retty.me/area/PRE13/ARE7/SUB701/）"
        required: true
        default: "https://retty.me/area/PRE13/ARE7/SUB701/"
      max_count:
        description: "Step① 最大収集件数（恵比寿全店取得のため既定を大きく設定）"
        required: false
        default: "2000"
      sleep:
        description: "リクエスト間 sleep 秒（robots/負荷配慮・429 回避）"
        required: false
        default: "5"
      csv:
        description: "クロール対象 CSV のリポジトリ内パス（例: data/crawl-targets/ebisu.csv）。指定時は Step① discovery をスキップし、この既存 CSV を Step② で使う。空なら area_url から CSV を生成"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: crawl-stores
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Show Python version
        run: python3 --version
        # crawler は標準ライブラリのみで動作するため pip install 不要

      - name: Resolve target CSV path
        id: target
        run: |
          # csv 入力があればそれを使い Step① をスキップ。なければ area_url から
          # エリア名（SUB コード）を拾って data/crawl-targets/{area}.csv に生成する。
          # schedule トリガーは inputs を持たないため csv は常に空 → 既定恵比寿で discovery。
          CSV_INPUT="${{ github.event.inputs.csv }}"
          AREA_URL="${{ github.event.inputs.area_url || 'https://retty.me/area/PRE13/ARE7/SUB701/' }}"
          if [ -n "${CSV_INPUT}" ]; then
            echo "csv_path=${CSV_INPUT}" >> "$GITHUB_OUTPUT"
            echo "run_discovery=false" >> "$GITHUB_OUTPUT"
            echo "[target] using existing CSV: ${CSV_INPUT} (discovery skipped)"
          else
            # 既定（恵比寿）は ebisu。それ以外は area_url 末尾の SUB コードを slug に使う。
            if [ "${AREA_URL}" = "https://retty.me/area/PRE13/ARE7/SUB701/" ]; then
              AREA_SLUG="ebisu"
            else
              AREA_SLUG=$(echo "${AREA_URL}" | grep -oE 'SUB[0-9]+' | head -1)
              [ -z "${AREA_SLUG}" ] && AREA_SLUG="area"
              AREA_SLUG=$(echo "${AREA_SLUG}" | tr '[:upper:]' '[:lower:]')
            fi
            echo "csv_path=data/crawl-targets/${AREA_SLUG}.csv" >> "$GITHUB_OUTPUT"
            echo "run_discovery=true" >> "$GITHUB_OUTPUT"
            echo "[target] will generate CSV: data/crawl-targets/${AREA_SLUG}.csv from ${AREA_URL}"
          fi

      - name: "Step① discovery (area -> CSV)"
        if: steps.target.outputs.run_discovery == 'true'
        id: discovery
        run: |
          python3 scripts/crawl_retty.py gen-csv \
            --area-url "${{ github.event.inputs.area_url || 'https://retty.me/area/PRE13/ARE7/SUB701/' }}" \
            --out "${{ steps.target.outputs.csv_path }}" \
            --max-count "${{ github.event.inputs.max_count || '2000' }}" \
            --sleep "${{ github.event.inputs.sleep || '5' }}"

      - name: "Commit discovery CSV (intermediate artifact)"
        if: steps.target.outputs.run_discovery == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.target.outputs.csv_path }}"
          if git diff --cached --quiet; then
            echo "No CSV changes to commit."
          else
            # [skip ci] を付けて CSV だけの commit でビルドを発火させない。
            git commit -m "chore(crawl-targets): discovery CSV を更新 (${{ steps.target.outputs.csv_path }}) [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: "Step② extraction (CSV -> store.json)"
        id: crawl
        run: |
          python3 scripts/crawl_retty.py \
            --csv "${{ steps.target.outputs.csv_path }}" \
            --out-dir stores \
            --sleep "${{ github.event.inputs.sleep || '5' }}"

      - name: Update sitemap & search-index
        run: |
          python3 scripts/update_sitemap.py --stores-dir stores

      - name: Validate generated store.json
        run: |
          python3 scripts/validate_store.py --all stores

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stores/
          if git diff --cached --quiet; then
            echo "No store changes to commit."
            exit 0
          fi
          COUNT=$(python3 -c "import json,glob; print(len(glob.glob('stores/*/*/store.json')))")
          # [skip ci] は付けない — store.json 変更で auto-build.yml を発火させ、
          # 変更されたサイトだけをインクリメンタルに再ビルドする（#25）。
          git commit -m "chore(stores): クロール結果を反映 (${COUNT} 店舗)"
          # rebase してから push（並行更新に備える）
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Summary
        if: always()
        run: |
          echo "## Crawl Retty Stores 結果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 項目 | 値 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| csv_path | ${{ steps.target.outputs.csv_path }} |" >> $GITHUB_STEP_SUMMARY
          echo "| discovery | ${{ steps.target.outputs.run_discovery }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.target.outputs.run_discovery }}" = "true" ]; then
            echo "| area_url | ${{ github.event.inputs.area_url || 'https://retty.me/area/PRE13/ARE7/SUB701/' }} |" >> $GITHUB_STEP_SUMMARY
            echo "| max_count | ${{ github.event.inputs.max_count || '2000' }} |" >> $GITHUB_STEP_SUMMARY
            echo "| targets_written | ${{ steps.discovery.outputs.targets_written }} |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| sleep | ${{ github.event.inputs.sleep || '5' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| stores_written | ${{ steps.crawl.outputs.stores_written }} |" >> $GITHUB_STEP_SUMMARY
          echo "| stores_failed | ${{ steps.crawl.outputs.stores_failed }} |" >> $GITHUB_STEP_SUMMARY
          TOTAL=$(python3 -c "import glob; print(len(glob.glob('stores/*/*/store.json')))" 2>/dev/null || echo "?")
          echo "| stores total | ${TOTAL} |" >> $GITHUB_STEP_SUMMARY
