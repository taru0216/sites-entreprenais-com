    const GENERATED = new Set(generatedIds);
    const PER_PAGE = 50;
    let all = [];
    let filtered = [];
    let page = 1;

    const $ = (id) => document.getElementById(id);
    const grid = $('grid'), pager = $('pager'), metaLine = $('metaLine'), empty = $('empty');

    function render() {
      const total = filtered.length;
      const pages = Math.max(1, Math.ceil(total / PER_PAGE));
      if (page > pages) page = pages;
      const start = (page - 1) * PER_PAGE;
      const slice = filtered.slice(start, start + PER_PAGE);

      metaLine.textContent = total > 0
        ? `${total} 件中 ${start + 1}〜${Math.min(start + PER_PAGE, total)} 件を表示`
        : '';
      empty.style.display = total === 0 ? 'block' : 'none';

      grid.innerHTML = slice.map(s => {
        const cat = s.category || (s.categories && s.categories[0]) || '';
        const live = GENERATED.has(s.retty_id);
        const action = live
          ? `<div class="go"><a href="/foodre/${s.retty_id}/">ホームページを見る →</a></div>`
          : `<span class="badge-soon">HP 準備中</span>`;
        const sta = s.nearest_station ? `<div class="sta">🚉 ${escapeHtml(s.nearest_station)}</div>` : '';
        const thumb = s.photo
          ? `<div class="card-photo"><img src="${escapeHtml(s.photo)}" alt="${escapeHtml(s.name || '')}" loading="lazy" /></div>`
          : `<div class="card-photo card-photo-empty">🍽</div>`;
        return `<div class="card">
          ${thumb}
          ${cat ? `<span class="cat">${escapeHtml(cat)}</span>` : ''}
          <h3>${escapeHtml(s.name || '')}</h3>
          <div class="addr">${escapeHtml(s.address || '')}</div>
          ${sta}
          ${action}
        </div>`;
      }).join('');

      // pager
      const btns = [];
      btns.push(`<button ${page === 1 ? 'disabled' : ''} data-p="${page - 1}">‹ 前</button>`);
      const win = 2;
      const lo = Math.max(1, page - win), hi = Math.min(pages, page + win);
      if (lo > 1) { btns.push(`<button data-p="1">1</button>`); if (lo > 2) btns.push(`<button disabled>…</button>`); }
      for (let p = lo; p <= hi; p++) btns.push(`<button class="${p === page ? 'active' : ''}" data-p="${p}">${p}</button>`);
      if (hi < pages) { if (hi < pages - 1) btns.push(`<button disabled>…</button>`); btns.push(`<button data-p="${pages}">${pages}</button>`); }
      btns.push(`<button ${page === pages ? 'disabled' : ''} data-p="${page + 1}">次 ›</button>`);
      pager.innerHTML = btns.join('');
      pager.querySelectorAll('button[data-p]').forEach(b => {
        b.addEventListener('click', () => { page = parseInt(b.dataset.p, 10); render(); window.scrollTo({ top: 0, behavior: 'smooth' }); });
      });
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    function applyFilter() {
      const q = $('q').value.trim().toLowerCase();
      const cat = $('catFilter').value;
      filtered = all.filter(s => {
        if (cat && !((s.categories || []).includes(cat) || s.category === cat)) return false;
        if (!q) return true;
        const hay = [s.name, s.address, s.nearest_station, s.category, ...(s.categories || [])].join(' ').toLowerCase();
        return hay.includes(q);
      });
      // 生成済みを先頭に
      filtered.sort((a, b) => (GENERATED.has(b.retty_id) ? 1 : 0) - (GENERATED.has(a.retty_id) ? 1 : 0));
      page = 1;
      render();
    }

    fetch('/stores/search-index.json')
      .then(r => r.json())
      .then(data => {
        all = data;
        // カテゴリ選択肢を構築
        const catSet = new Set();
        all.forEach(s => { if (s.category) catSet.add(s.category); (s.categories || []).forEach(c => catSet.add(c)); });
        const sel = $('catFilter');
        [...catSet].sort((a, b) => a.localeCompare(b, 'ja')).forEach(c => {
          const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o);
        });
        applyFilter();
        $('q').addEventListener('input', applyFilter);
        sel.addEventListener('change', applyFilter);
      })
